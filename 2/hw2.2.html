<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hw2.2</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .container{
      width: 100%;
      height: 300px;
      background-color: #51d059;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }
    .box{
      width: 100px;
      height: 100px;
      background-color: red;
      transition: 0.5s;
    }
    .box:hover{
      border-radius: 50%;
      background-color: blue;
      transition: 0.2s;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
  <div class="box"></div>
</div>
</body>
</html>
