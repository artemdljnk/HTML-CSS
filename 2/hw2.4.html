<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hw2.4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Fjalla+One&family=Indie+Flower&family=Rubik+Pixels&family=Sedgwick+Ave+Display&display=swap" rel="stylesheet">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 300px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .box{
            width: 250px;
            height: 250px;
            background-color: #51d059;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .size{
            font-size: 30px;
        }
        .text1{
            font-family: "Rubik Pixels", system-ui;
        }
        .text2{
            font-family: "Sedgwick Ave Display", cursive;
        }
        .text3{
            font-family: "Dancing Script", cursive;
        }
        .text4{
            font-family: "Fjalla One", sans-serif;
        }
        .text5{
            font-family: "Indie Flower", cursive;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="box"><p class="text1 size">Lorem</p></div>
    <div class="box"><p class="text2 size">Lorem</p></div>
    <div class="box"><p class="text3 size">Lorem</p></div>
    <div class="box"><p class="text4 size">Lorem</p></div>
    <div class="box"><p class="text5 size">Lorem</p></div>
</div>
</body>
</html>
