<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hw2.1</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background-color: #dcdcdc;
        }
        h1{
            text-align: center;
            padding: 50px 0 50px 0;
        }
        h2 {
            text-align: center;
            padding-bottom: 30px;
        }
        .container{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding-bottom: 40px;
        }
        .card{
            width: 350px;
            height: 370px;
            border: 1px solid black;
            border-radius: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
    </style>
</head>
<body>
<h1>What do i have in my fridge?</h1>
<div class="container">
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=18075&format=png&color=000000" alt="">
        <p>Pepper</p>
    </div>
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=bh3u53zqHxK4&format=png&color=000000" alt="">

    </div>
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=Ayh9wu47jygU&format=png&color=000000" alt="">
        <p>Cheese</p>
    </div>
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=13285&format=png&color=000000" alt="">
        <p>Corn</p>
    </div>
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=36485&format=png&color=000000" alt="">

        <img src="https://img.icons8.com/?size=100&id=D8c2WC1vBJE6&format=png&color=000000" alt="">

    </div>
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=92389&format=png&color=000000" alt="">
        <p>Beef</p>
    </div>
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=101716&format=png&color=000000" alt="">
        <p>Fish</p>
    </div>
    <div class="card">
        <img src="https://img.icons8.com/?size=100&id=4inCHOs1ZzHy&format=png&color=000000" alt="">
