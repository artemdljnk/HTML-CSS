<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hw4.5</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    header{
      width: 100vw;
      height: 4vh;
      background: #D9D9D9;
    }
    main{
      width: 100vw;
      height: 74vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    section{
      width: 59vw;
      height: 74vh;
      background: #A4A4A4;
    }
    aside{
      width: 41vw;
      height: 74vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-direction: column;
    }
    .aside-top{
      width: 41vw;
      height: 40vh;
      background: #7F7A7A;
    }
    .aside-bottom{
      width: 41vw;
      height: 34vh;
      background: #615050;
    }
    nav{
      width: 100vw;
      height: 10vh;
      background: #D9D9D9;
    }
    footer{
      width: 100vw;
      height: 12vh;
      background: #AFA9A9;
    }
  </style>
</head>
<body>
<header></header>
<main>
  <section></section>
  <aside>
    <div class="aside-top"></div>
    <div class="aside-bottom"></div>
  </aside>
</main>
<nav></nav>
<footer></footer>
</body>
</html>
