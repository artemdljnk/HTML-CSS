<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hw4.3</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    header, footer{
      width: 100vw;
      height: 22vh;
      background: #D9D9D9;
    }
    main{
      width: 100vw;
      height: 56vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .left, .right{
      width: 27vw;
      height: 56vh;
      background: #C0BDBD;
    }
    .middle {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .top {
      width: 46vw;
      height: 28vh;
      background: #827878;
    }
    .bottom {
      width: 46vw;
      height: 28vh;
      background: #B7ADAD;
    }
  </style>
</head>
<body>
<header></header>
<main>
  <section class="left"></section>
  <section class="middle">
    <div class="top"></div>
    <div class="bottom"></div>
  </section>
  <section class="right"></section>
</main>
<footer></footer>
</body>
</html>
