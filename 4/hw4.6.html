<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hw4.6</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    header{
      width: 100vw;
      height: 4.5vh;
      background: #D9D9D9;
    }
    main{
      width: 100vw;
      height: 85.5vh;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: rgba(0, 0, 0, 0.18);
    }
    .left-section{
      width: 59vw;
      height: 85.5vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .section-first{
      width: 29vw;
      height: 85.5vh;
      background: #A4A4A4;
    }
    .section-second{
      width: 30.5vw;
      height: 85.5vh;
      background: #C1C1C1;
    }
    .right-aside{
      width: 41vw;
      height: 85.5vh;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-direction: column;
    }
    .aside-top{
      width: 41vw;
      height: 43vh;
      background: #7F7A7A;
    }
    .aside-bottom{
      background: #6B6161;
      width: 41vw;
      height: 43vh;
    }
    footer{
      width: 100vw;
      height: 10vh;
      background: #D9D9D9;
    }
  </style>
</head>
<body>
<header></header>
<main>
  <section class="left-section">
    <div class="section-first"></div>
    <div class="section-second"></div>
  </section>
  <aside class="right-aside">
    <div class="aside-top"></div>
    <div class="aside-bottom"></div>
  </aside>
</main>
<footer></footer>
</body>
</html>
